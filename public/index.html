<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartOpenPath | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              primary: { 500: '#3b82f6', 600: '#2563eb' }
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-[#0a192f] to-slate-950 text-slate-200 font-sans antialiased min-h-screen selection:bg-primary-500 selection:text-white">
    <div class="fixed inset-0 pointer-events-none opacity-[0.06]" style="background-image: linear-gradient(to right, #3b82f6 1px, transparent 1px), linear-gradient(to bottom, #3b82f6 1px, transparent 1px); background-size: 4rem 4rem; mask-image: radial-gradient(circle at center, black, transparent 80%);"></div>

    <main class="relative z-10 max-w-5xl mx-auto px-6 py-10 md:py-16">
      <div class="grid grid-cols-1 lg:grid-cols-[1.2fr_0.8fr] gap-6 items-stretch">
        <section class="rounded-3xl border border-slate-800/80 bg-slate-900/70 backdrop-blur-xl p-8 md:p-10 shadow-2xl shadow-blue-900/10 overflow-hidden relative">
          <div class="absolute inset-0 pointer-events-none opacity-60" style="background: radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 35%), radial-gradient(circle at bottom left, rgba(14,165,233,0.12), transparent 28%);"></div>
          <div class="relative">
            <div class="inline-flex items-center justify-center p-2 bg-slate-950 border border-slate-700/60 rounded-2xl mb-5 shadow-lg shadow-blue-900/20">
              <svg class="w-6 h-6 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-white mb-4 leading-tight">Build smarter learning roadmaps.</h1>
            <p class="text-slate-400 text-lg md:text-xl max-w-2xl leading-relaxed">Sign in to your workspace, create multiple roadmap tracks, and continue learning with saved progress.</p>
            <div class="mt-6 flex flex-wrap gap-3 text-sm text-slate-300">
              <span class="px-3 py-1.5 rounded-full border border-slate-700 bg-slate-950/70">Two-page flow</span>
              <span class="px-3 py-1.5 rounded-full border border-slate-700 bg-slate-950/70">Roadmap sidebar library</span>
              <span class="px-3 py-1.5 rounded-full border border-slate-700 bg-slate-950/70">Progress saved per roadmap</span>
            </div>
          </div>
        </section>

        <section class="rounded-3xl border border-slate-800 bg-slate-900/75 backdrop-blur-xl shadow-2xl shadow-blue-900/10 overflow-hidden">
          <div class="px-6 py-5 border-b border-slate-800 bg-slate-950/70">
            <h2 class="text-lg font-semibold text-white">Sign Up or Log In</h2>
            <p class="text-sm text-slate-400 mt-1">You will be redirected to your roadmap workspace.</p>
          </div>

          <div class="p-6 space-y-4">
            <div class="flex items-center gap-2 p-1 bg-slate-950/80 border border-slate-800 rounded-xl">
              <button id="auth-mode-login" type="button" class="flex-1 px-4 py-2 rounded-lg text-sm font-semibold bg-primary-600 text-white shadow-lg shadow-primary-500/20">Login</button>
              <button id="auth-mode-register" type="button" class="flex-1 px-4 py-2 rounded-lg text-sm font-semibold text-slate-300 hover:text-white hover:bg-slate-800/70 transition-colors">Sign Up</button>
            </div>

            <div id="auth-name-group" class="flex flex-col gap-2 hidden">
              <label for="auth-name" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Name</label>
              <input id="auth-name" autocomplete="name" class="w-full bg-slate-950/80 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all shadow-inner" placeholder="Your name" />
            </div>

            <div class="flex flex-col gap-2">
              <label for="auth-email" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Email</label>
              <input id="auth-email" type="email" autocomplete="email" class="w-full bg-slate-950/80 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all shadow-inner" placeholder="name@example.com" />
            </div>

            <div class="flex flex-col gap-2">
              <label for="auth-password" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
              <input id="auth-password" type="password" autocomplete="current-password" class="w-full bg-slate-950/80 border border-slate-700/80 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all shadow-inner" placeholder="At least 8 characters" />
            </div>

            <div class="flex flex-wrap items-center gap-3 pt-2">
              <button id="auth-register-btn" type="button" class="hidden bg-primary-600 text-white hover:bg-primary-500 px-5 py-2.5 rounded-lg font-semibold text-sm transition-all shadow-lg shadow-primary-500/25 active:scale-95 border border-primary-500/50">Create Account</button>
              <button id="auth-login-btn" type="button" class="bg-primary-600 text-white hover:bg-primary-500 px-5 py-2.5 rounded-lg font-semibold text-sm transition-all shadow-lg shadow-primary-500/25 active:scale-95 border border-primary-500/50">Sign In</button>
            </div>

            <div id="auth-status" class="text-sm font-medium text-slate-400 min-h-[1.25rem]" role="status" aria-live="polite"></div>
          </div>
        </section>
      </div>
    </main>

    <script src="/auth.js"></script>
  </body>
</html>
